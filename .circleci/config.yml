version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.18
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            docker build -t $DOCKERHUB_USERNAME/dulap:latest .
      - run:
          name: Login to Docker Hub
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Push Docker image to Docker Hub
          command: |
            docker push $DOCKERHUB_USERNAME/dulap:latest
      - persist_to_workspace:
          root: .
          paths:
            - .

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - add_ssh_keys:
          fingerprints:
            - "SHA256:hwnLNo/98stGbUwBDY5njE9IZ5HdjNTuN+Fz4JdSPms"  # Set in CircleCI SSH settings
      - run:
          name: Deploy and restart container on VPS
          command: |
            ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
              docker pull $DOCKERHUB_USERNAME/dulap:latest
              docker stop dulap || true
              docker rm dulap || true
              docker run -d --name dulap -p 80:80 $DOCKERHUB_USERNAME/dulap:latest
            EOF

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build-and-push
      - deploy:
          requires:
            - build-and-push

