server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve Next.js static files
    location /_next/ {
        try_files $uri $uri/ =404;
    }

    location /static/ {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}